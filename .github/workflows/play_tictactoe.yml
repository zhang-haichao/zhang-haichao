name: Play_TicTacToe
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-tictactoe-master
  cancel-in-progress: false

jobs:
  play:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update game
        run: python tictactoe.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          WORKSPACE_ID: ${{ secrets.WORKSPACE_ID }}

      - name: Commit and push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md game_state.json tile_count.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Updated game [skip ci]"
          if git push origin HEAD:master; then
            exit 0
          fi

          echo "Push rejected, retry once from latest origin/master..."
          git fetch origin master
          git reset --hard origin/master
          python tictactoe.py
          git add README.md game_state.json tile_count.json
          git diff --staged --quiet && echo "No changes after retry" && exit 0
          git commit -m "Updated game [skip ci]"
          git push origin HEAD:master
